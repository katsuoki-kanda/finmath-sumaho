<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hand Math Game - Large UI v4.7</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <style>
        body { 
            margin: 0; padding: 0; background: #000; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; touch-action: none; color: white;
            height: 100dvh;
        }
        
        /* 起動画面 */
        #launcher {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: absolute; width: 100%; height: 100dvh; z-index: 100; background: #222; text-align: center;
        }
        .start-btn {
            padding: 20px 40px; font-size: 22px; font-weight: bold; cursor: pointer;
            background: #0f0; color: #000; border: none; border-radius: 50px;
            box-shadow: 0 5px 20px rgba(0,255,0,0.4); transition: 0.3s;
        }
        .start-btn:active { transform: scale(0.95); }
        .hint-text { margin-top: 20px; color: #ccc; font-size: 14px; padding: 0 20px; line-height: 1.6; }
        
        /* ゲーム画面 */
        #game-container { 
            display: none; position: relative; width: 100%; height: 100dvh; background: #000; 
        }
        
        canvas { 
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100dvh; 
            object-fit: cover; 
            transform: scaleX(-1); 
        }
        
        /* UIレイヤー */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; color: #0f0; text-shadow: 3px 3px #000;
            box-sizing: border-box; z-index: 10;
        }
        /* スコア・タイマー共通設定 (1.5倍サイズ) */
        .hud { 
            position: absolute;
            top: 20px;
            font-size: clamp(30px, 9vw, 52px); 
            font-weight: bold; 
        }
        #score-text { left: 20px; }
        #time-text { right: 20px; } /* タイマーを右上に配置 */

        #status-text { 
            position: absolute; top: 15%; left: 0; width: 100%; 
            font-size: 18px; color: #ffff00; text-align: center; font-weight: bold; 
        }
        
        /* 数式エリア */
        #question-area { 
            position: absolute; top: 38%; left: 50%; transform: translate(-50%, -50%); 
            text-align: center; width: 100%; 
        }
        .main-q { 
            font-size: 48vw; 
            line-height: 1;
            color: #f00; font-weight: bold; 
            -webkit-text-stroke: 4px #00f;
            letter-spacing: -2vw;
        }
        
        .correct-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70vw; height: 70vw; max-width: 400px; max-height: 400px;
            border: 20px solid #f00; border-radius: 50%; display: none;
            box-shadow: 0 0 50px rgba(255,0,0,0.5);
        }

        /* 下部コントロール */
        #mobile-controls { 
            position: absolute; 
            bottom: max(25px, env(safe-area-inset-bottom));
            left: 0; width: 100%; 
            display: flex; justify-content: center; 
            gap: 10px; z-index: 50; 
            padding: 0 10px; box-sizing: border-box;
        }
        .ctrl-btn { 
            flex: 1; max-width: 120px;
            padding: 15px 5px; 
            background: rgba(0,0,0,0.85); 
            color: #0f0; border: 2px solid #0f0; border-radius: 12px; 
            font-size: 14px; font-weight: bold;
            pointer-events: auto; cursor: pointer;
        }
        .ctrl-btn:active { background: #0f0; color: #000; }
    </style>
</head>
<body>

<div id="launcher">
    <h1 style="margin-bottom:20px; font-size: 28px;">指計算ゲーム v4.7</h1>
    <button class="start-btn" onclick="startApp()">ゲームを開始する</button>
    <div class="hint-text">
        カメラを使用します。<br>
        手首を画面の<b>上の方</b>へ挙げるとスタート！
    </div>
</div>

<div id="game-container">
    <video id="input_video" style="display:none;" playsinline muted></video>
    <canvas id="output_canvas"></canvas>
    <div id="ui-layer">
        <div class="hud" id="score-text">Score: 0</div>
        <div class="hud" id="time-text">Time: 60</div>
        <div id="status-text">カメラ準備中...</div>
        <div id="question-area">
            <div id="main-q" class="main-q"></div>
            <div id="correct-circle" class="correct-circle"></div>
        </div>
    </div>
    <div id="mobile-controls">
        <button class="ctrl-btn" onclick="setMode(1)">音声モード</button>
        <button class="ctrl-btn" onclick="setMode(0)">表示モード</button>
        <button class="ctrl-btn" onclick="location.reload()">再起動</button>
    </div>
</div>

<script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const scoreText = document.getElementById('score-text');
    const timeText = document.getElementById('time-text');
    const statusText = document.getElementById('status-text');
    const mainQ = document.getElementById('main-q');
    const correctCircle = document.getElementById('correct-circle');

    let score = 0, timeLeft = 60, gameStarted = false, isWaitingStartVoice = false;
    let voiceMode = 0, currentAns = 0, lastAns = 0, seiCount = 0, startTime = 0;
    let lastHandCount = 0, handStableTime = 0, audioCtx;
    let camera = null;

    const START_THRESHOLD = 0.3;   
    const INVALID_THRESHOLD = 0.65; 

    function safeSpeak(text, callback) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        uttr.lang = 'ja-JP';
        let hasFinished = false;
        const finish = () => { if (!hasFinished) { hasFinished = true; if (callback) callback(); } };
        uttr.onend = finish;
        uttr.onerror = finish;
        window.speechSynthesis.speak(uttr);
        setTimeout(finish, 3000);
    }

    async function startApp() {
        try {
            document.getElementById('launcher').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
            hands.setOptions({ 
                maxNumHands: 2, 
                modelComplexity: 1, 
                minDetectionConfidence: 0.6, 
                minTrackingConfidence: 0.6 
            });
            hands.onResults(onResults);

            camera = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720
            });

            await camera.start();
            statusText.textContent = "手首を画面上部へ挙げるとスタート！";
        } catch (err) {
            alert("カメラエラー: " + err.message);
        }
    }

    function beep() {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function initGame() {
        if (isWaitingStartVoice || gameStarted) return;
        isWaitingStartVoice = true;
        score = 0; timeLeft = 60;
        scoreText.textContent = `Score: ${score}`;
        timeText.textContent = `Time: ${timeLeft}`;
        statusText.textContent = "";
        
        safeSpeak("スタート", () => {
            isWaitingStartVoice = false;
            gameStarted = true;
            startTime = Date.now();
            generateQuestion();
        });
    }

    function generateQuestion() {
        let n1, n2, newAns;
        do {
            n1 = Math.floor(Math.random() * 5) + 1;
            n2 = Math.floor(Math.random() * 5) + 1;
            newAns = n1 + n2;
        } while (newAns === lastAns);
        
        currentAns = newAns;
        lastAns = currentAns; 
        if (voiceMode === 1) {
            mainQ.textContent = "?+?";
            safeSpeak(`${n1}たす${n2}`);
        } else {
            mainQ.textContent = `${n1}+${n2}`;
        }
    }

    function analyzeFingers(lm, label) {
        const wrist = lm[0];
        const middleTip = lm[12];
        if (middleTip.y > wrist.y) return 0;
        let count = 0;
        const isR = label === 'Right';
        if (isR ? lm[4].x < lm[3].x : lm[4].x > lm[3].x) {
            if (lm[4].y < wrist.y) count++;
        }
        [8, 12, 16, 20].forEach(idx => {
            if (lm[idx].y < lm[idx - 2].y && lm[idx].y < wrist.y) count++;
        });
        return count;
    }

    function onResults(results) {
        if (canvasElement.width !== window.innerWidth || canvasElement.height !== window.innerHeight) {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        
        let rightF = 0, leftF = 0, hCount = 0;
        let labels = new Set();
        let startTrigger = false;

        if (results.multiHandLandmarks && results.multiHandedness) {
            for (let i = 0; i < results.multiHandLandmarks.length; i++) {
                const landmarks = results.multiHandLandmarks[i];
                const label = results.multiHandedness[i].label;
                const wrist = landmarks[0];

                if (wrist.y > INVALID_THRESHOLD) continue;
                if (labels.has(label)) continue;
                labels.add(label); 
                hCount++;

                drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', radius: 4});

                const count = analyzeFingers(landmarks, label);
                if (label === 'Right') rightF = count; else leftF = count;

                if (!gameStarted && !isWaitingStartVoice && wrist.y < START_THRESHOLD) {
                    startTrigger = true;
                }
            }
        }

        if (startTrigger) initGame();

        const now = Date.now();
        if (hCount !== lastHandCount) { handStableTime = now; lastHandCount = hCount; }
        const isStable = (now - handStableTime) > 150;
        const total = rightF + leftF;

        if (gameStarted) {
            const elapsed = Math.floor((now - startTime) / 1000);
            timeLeft = Math.max(0, 60 - elapsed);
            timeText.textContent = `Time: ${timeLeft}`;

            if (timeLeft <= 0) {
                gameStarted = false;
                mainQ.textContent = "終了"; // FINISHから変更
                safeSpeak(`終了。スコアは${score}点。`);
            }

            if (total === currentAns && isStable && seiCount === 0 && timeLeft > 0) {
                if (currentAns > 5 && hCount < 2) return; 
                score++;
                scoreText.textContent = `Score: ${score}`;
                beep();
                seiCount = 1;
                correctCircle.style.display = "block";
                mainQ.textContent = currentAns;
                setTimeout(() => {
                    correctCircle.style.display = "none";
                    seiCount = 0;
                    if (gameStarted) generateQuestion();
                }, 700);
            }
        }
        canvasCtx.restore();
    }
    
    function setMode(m) { 
        voiceMode = m; 
        safeSpeak(m === 1 ? "音声モードに変更" : "表示モードに変更"); 
    }
    
    window.addEventListener('resize', () => {
        canvasElement.width = window.innerWidth;
        canvasElement.height = window.innerHeight;
    });
</script>
</body>
</html>
